*{margin:0;padding:0;box-sizing:border-box}

select option{background:#111827;color:#e2e8f0}

.tab-btn{background:none;border:none;color:#94a3b8;padding:8px 16px;cursor:pointer;font-size:13px;font-weight:600;border-bottom:2px solid transparent;border-radius:6px 6px 0 0;font-family:inherit;white-space:nowrap;transition:all .2s}
.tab-btn.active{color:#06b6d4;border-bottom-color:#06b6d4;background:rgba(6,182,212,0.08)}
.content{padding:14px 0 40px;display:flex;flex-direction:column;gap:14px;max-width:100%;overflow-x:hidden}
.card{background:#151d2e;border:1px solid #1e293b;border-radius:10px;padding:16px;overflow:hidden;max-width:100%}
.card-title{margin:0 0 12px;font-size:15px;font-weight:700;letter-spacing:-0.3px;color:#f1f5f9}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;max-width:100%}
.stat-card{background:#151d2e;border:1px solid #1e293b;border-radius:8px;padding:12px 14px;display:flex;flex-direction:column;gap:4px;overflow:hidden}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:100%}
.field{display:flex;flex-direction:column;gap:3px;min-width:0;overflow:hidden}
.field-full{grid-column:1/-1}
.lbl{font-size:11px;color:#e2e8f0;font-weight:600}
.inp,.sel{background:#111827;border:1px solid #475569;border-radius:6px;color:#f8fafc;padding:7px 10px;font-size:13px;font-family:inherit;outline:none;width:100%;min-width:0;max-width:100%;box-sizing:border-box}
.inp:focus,.sel:focus{border-color:#06b6d4}
input[type="date"]{-webkit-appearance:none;appearance:none}
.btn-main{margin-top:12px;background:linear-gradient(135deg,#06b6d4,#8b5cf6);border:none;border-radius:6px;color:#fff;padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;width:100%}
.btn-sm{background:none;border:1px solid #475569;color:#cbd5e1;border-radius:4px;cursor:pointer;font-size:10px;line-height:1;padding:3px 6px;font-family:inherit}
.btn-sm.danger{border-color:#ef444466;color:#ef4444}
.btn-del{background:none;border:1px solid #475569;color:#cbd5e1;border-radius:4px;cursor:pointer;font-size:14px;line-height:1;padding:2px 5px;font-family:inherit}

.table-wrap{overflow-x:auto;max-width:100%}
table{width:100%;border-collapse:collapse;font-size:12px}
.th{text-align:left;padding:7px 8px;background:#111827;color:#94a3b8;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.th-sub{text-align:left;padding:5px 8px;background:#111827;color:#94a3b8;font-size:10px;font-weight:600}
.td{padding:7px 8px;border-bottom:1px solid rgba(30,41,59,.25);color:#cbd5e1}
.td-r{text-align:right}
.td-b{font-weight:700;color:#f1f5f9}
.br{border-right:1px solid #1e293b}
.result-bar{margin-top:10px;padding:9px 12px;border-radius:6px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}

.cat-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;white-space:nowrap}
.sub-badge{font-size:10px;color:#cbd5e1;background:#1e293b;padding:1px 5px;border-radius:3px}
.mono{font-family:'JetBrains Mono',monospace}
.hero-card{background:linear-gradient(135deg,#111827 0%,#1a2332 100%);border:1px solid #2d3a4d;border-radius:10px;padding:16px;max-width:100%;overflow:hidden}

.bar-fill{height:4px;border-radius:2px;transition:width .3s}
.hidden{display:none}
@media(max-width:500px){.form-grid{grid-template-columns:1fr!important}.stats-grid{grid-template-columns:repeat(2,1fr)!important}}

<div class="container" id="app">

    <div>
      <h1 class="logo">Ledger</h1>
      <p id="hdrSub" style="color:#94a3b8;font-size:12px"></p>
    </div>
    <div class="header-right">

      <button class="btn-sm" onclick="importData()" title="Import">↑</button>
      <button class="btn-sm danger" onclick="resetAll()" title="Reset">✕</button>

  <nav class="tab-bar" id="tabBar"></nav>
  <div class="content" id="tabContent"></div>
</div>

const MONTHS_T = {
en:[“Jan”,“Feb”,“Mar”,“Apr”,“May”,“Jun”,“Jul”,“Aug”,“Sep”,“Oct”,“Nov”,“Dec”],
hi:[“जन”,“फर”,“मार्च”,“अप्रैल”,“मई”,“जून”,“जुलाई”,“अग”,“सित”,“अक्टू”,“नव”,“दिस”],

};

const CAT_COLORS={income:”#22c55e”,business_expense:”#f59e0b”,business_purchase:”#3b82f6”,personal_expense:”#ef4444”,loan_taken:”#a855f7”,loan_repayment:”#a855f7”,creditor_purchase:”#ec4899”,creditor_payment:”#ec4899”,overdraft_taken:”#f97316”,overdraft_repayment:”#f97316”,neutral:”#8b5cf6”};
const CAT_ICONS={income:“↓”,business_expense:“↗”,business_purchase:“◆”,personal_expense:“↑”,loan_taken:“⬇”,loan_repayment:“⬆”,creditor_purchase:“📋”,creditor_payment:“✓”,overdraft_taken:“⚡”,overdraft_repayment:“↩”,neutral:“⇄”};
const ASSET_KEYS={machine:“machine”,furniture:“furniture”,instruments:“instruments”,inventory:“inventory”,electronics:“electronics”,vehicle:“vehicle”,other_biz_pur:“other”};

const SUB_KEYS={
business_expense:[“salary”,“utilities”,“rent”,“maintenance”,“transport”,“other”],
business_purchase:[“machine”,“furniture”,“instruments”,“inventory”,“electronics”,“vehicle”,“other”],
personal_expense:[“food”,“grocery”,“medical”,“clothing”,“entertainment”,“other”],
income:[“sales”,“commission”,“interest”,“other”],
creditor_purchase:[“machine”,“furniture”,“instruments”,“inventory”,“electronics”,“vehicle”,“other”],
};

function catLabel(key){return t(key)||key}
function subLabel(key){return t(key)||key}
function assetLabel(key){return t(key)||key}

let state={entries:[],openingStock:0};
let currentTab=0;

function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function formatINR(n){if(n==null)return”₹0”;const s=Math.abs(n).toLocaleString(“en-IN”,{maximumFractionDigits:0});return(n<0?”-₹”:“₹”)+s}
function getMonthKey(d){const dt=new Date(d);return dt.getFullYear()+”-”+String(dt.getMonth()+1).padStart(2,“0”)}
function getMonthLabel(k){const[y,m]=k.split(”-”);return MONTHS_T[lang][parseInt(m)-1]+” “+y}
function esc(s){const d=document.createElement(“div”);d.textContent=s;return d.innerHTML}

const SK=“ledger-v2”;
function load(){try{const d=localStorage.getItem(SK);return d?JSON.parse(d):{entries:[],openingStock:0}}catch{return{entries:[],openingStock:0}}}
function save(){try{localStorage.setItem(SK,JSON.stringify(state))}catch(e){console.error(e)}}

function computeAll(){
const entries=state.entries,openingStock=state.openingStock;
let income=0,bizExp=0,bizPurch=0,persExp=0,cashBal=0,bankBal=0,loans=0,creditors=0,overdraft=0,creditPurchases=0;
const assetBreakdown={},subBreakdown={};
entries.forEach(e=>{
const amt=Number(e.amount),sub=e.subcategory||“other”,cat=e.category,mode=e.paymentMode||“cash”;
if(!subBreakdown[cat])subBreakdown[cat]={};
subBreakdown[cat][sub]=(subBreakdown[cat][sub]||0)+amt;
switch(cat){
case”income”:income+=amt;if(mode===“bank”)bankBal+=amt;else cashBal+=amt;break;
case”business_expense”:bizExp+=amt;if(mode===“bank”)bankBal-=amt;else cashBal-=amt;break;
case”business_purchase”:bizPurch+=amt;if(mode===“bank”)bankBal-=amt;else cashBal-=amt;assetBreakdown[sub]=(assetBreakdown[sub]||0)+amt;break;
case”personal_expense”:persExp+=amt;if(mode===“bank”)bankBal-=amt;else cashBal-=amt;break;
case”loan_taken”:loans+=amt;if(mode===“bank”)bankBal+=amt;else cashBal+=amt;break;
case”loan_repayment”:loans-=amt;if(mode===“bank”)bankBal-=amt;else cashBal-=amt;break;
case”creditor_purchase”:creditors+=amt;creditPurchases+=amt;assetBreakdown[sub]=(assetBreakdown[sub]||0)+amt;break;
case”creditor_payment”:creditors-=amt;if(mode===“bank”)bankBal-=amt;else cashBal-=amt;break;
case”overdraft_taken”:overdraft+=amt;bankBal+=amt;break;
case”overdraft_repayment”:overdraft-=amt;bankBal-=amt;break;
case”neutral”:if(e.transferTo===“bank”){cashBal-=amt;bankBal+=amt}else{cashBal+=amt;bankBal-=amt}break;
}
});
const tradingDebit=bizExp+bizPurch+creditPurchases,tradingCredit=income+openingStock,grossProfit=tradingCredit-tradingDebit;
const plDebit=persExp,plCredit=Math.max(grossProfit,0),netProfit=plCredit-plDebit;
const totalAssets=bizPurch+creditPurchases+Math.max(bankBal,0)+Math.max(cashBal,0);
const totalLiabilities=openingStock+Math.max(loans,0)+Math.max(creditors,0)+Math.max(overdraft,0);
const netWorth=totalAssets-totalLiabilities;
return{income,bizExp,bizPurch,persExp,openingStock,creditPurchases,tradingDebit,tradingCredit,grossProfit,plDebit,plCredit,netProfit,cashBal,bankBal,loans:Math.max(loans,0),creditors:Math.max(creditors,0),overdraft:Math.max(overdraft,0),totalAssets,totalLiabilities,netWorth,assetBreakdown,subBreakdown};
}

function accountTableHTML(title,accent,debitItems,creditItems,debitTotal,creditTotal,result,resultLabel,leftHead,rightHead){
const lh=leftHead||t(“debit”),rh=rightHead||t(“credit”);
const maxRows=Math.max(debitItems.length,creditItems.length);
let rows=””;
for(let i=0;i<maxRows;i++){
rows+=`<tr><td class="td">${debitItems[i]?.label||""}</td><td class="td td-r br">${debitItems[i]?.amount?formatINR(debitItems[i].amount):""}</td><td class="td">${creditItems[i]?.label||""}</td><td class="td td-r">${creditItems[i]?.amount?formatINR(creditItems[i].amount):""}</td></tr>`;
}
return`<div class="card" style="border-top:3px solid ${accent}"><h3 class="card-title" style="color:${accent}">${title}</h3><div class="table-wrap"><table> <thead><tr><th class="th br" colspan="2">${lh}</th><th class="th" colspan="2">${rh}</th></tr> <tr><th class="th-sub">${t("particular")}</th><th class="th-sub td-r br">${t("amt")}</th><th class="th-sub">${t("particular")}</th><th class="th-sub td-r">${t("amt")}</th></tr></thead> <tbody>${rows}<tr style="border-top:2px solid #334155"><td class="td td-b">${t("total")}</td><td class="td td-r td-b br">${formatINR(debitTotal)}</td><td class="td td-b">${t("total")}</td><td class="td td-r td-b">${formatINR(creditTotal)}</td></tr></tbody></table></div> <div class="result-bar" style="background:${accent}18;border-left:3px solid ${accent}"><span style="color:#94a3b8;font-size:13px">${resultLabel}</span><span class="mono" style="color:${accent};font-weight:800;font-size:22px">${formatINR(result)}</span></div></div>`;
}

}

const recent=[…state.entries].sort((a,b)=>b.createdAt-a.createdAt).slice(0,20);

function renderAccounts(){
const a=computeAll();
let debitItems=[{label:t(“business_expense”),amount:a.bizExp},{label:t(“purchaseCash”),amount:a.bizPurch}];
if(a.creditPurchases>0)debitItems.push({label:t(“purchaseCredit”),amount:a.creditPurchases});
const trading=accountTableHTML(t(“tradingAccount”),”#f59e0b”,debitItems,[{label:t(“businessIncome”),amount:a.income},{label:t(“openingStock”),amount:a.openingStock}],a.tradingDebit,a.tradingCredit,a.grossProfit,t(“grossProfit”));
const pl=accountTableHTML(t(“plAccount”),”#ef4444”,[{label:t(“personalCashOut”),amount:a.persExp}],[{label:t(“fromGrossProfit”),amount:Math.max(a.grossProfit,0)}],a.plDebit,a.plCredit,a.netProfit,t(“netProfit”));
const liabItems=[];
if(a.openingStock>0)liabItems.push({label:t(“capitalOS”),amount:a.openingStock});
if(a.creditors>0)liabItems.push({label:t(“creditors”),amount:a.creditors});
if(a.loans>0)liabItems.push({label:t(“loan”),amount:a.loans});
if(a.overdraft>0)liabItems.push({label:t(“overdraftFac”),amount:a.overdraft});
if(!liabItems.length)liabItems.push({label:”—”,amount:0});
const assetItems=[];
Object.entries(a.assetBreakdown).forEach(([k,v])=>{if(v>0)assetItems.push({label:assetLabel(k),amount:v})});
if(Math.max(a.bankBal,0)>0)assetItems.push({label:t(“bankBalance”),amount:Math.max(a.bankBal,0)});
if(Math.max(a.cashBal,0)>0)assetItems.push({label:t(“cashBalance”),amount:Math.max(a.cashBal,0)});

const bs=accountTableHTML(t(“balanceSheet”),”#06b6d4”,liabItems,assetItems,a.totalLiabilities,a.totalAssets,a.netWorth,t(“netWorthCalc”),t(“liabilities”),t(“assets”));
return trading+pl+bs;
}

function renderReports(){

}
const cats=[“income”,“business_expense”,“business_purchase”,“personal_expense”];
let subHTML=””;
const hasData=cats.some(c=>a.subBreakdown[c]&&Object.keys(a.subBreakdown[c]).length>0);
if(hasData){
let inner=cats.map(cat=>{
const data=a.subBreakdown[cat];if(!data||!Object.keys(data).length)return””;
const col=CAT_COLORS[cat],icon=CAT_ICONS[cat],cl=catLabel(cat);
const items=Object.entries(data).sort((a,b)=>b[1]-a[1]);const total=items.reduce((s,[,v])=>s+v,0);
let bars=items.map(([sub,amt])=>{const pct=total>0?(amt/total)*100:0;
return`<div style="margin-bottom:6px"><div style="display:flex;justify-content:space-between;font-size:12px;color:#94a3b8;margin-bottom:2px"><span>${esc(subLabel(sub))}</span><span class="mono">${formatINR(amt)}</span></div><div style="height:4px;background:#111827;border-radius:2px;overflow:hidden"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div></div>`;
}).join(””);
return`<div style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="color:${col};font-weight:700;font-size:13px">${icon} ${cl}</span><span class="mono" style="color:${col};font-weight:700;font-size:13px">${formatINR(total)}</span></div>${bars}</div>`;
}).join(””);
subHTML=`<div class="card"><h3 class="card-title">${t("categoryBreakdown")}</h3>${inner}</div>`;
}
if(!state.entries.length)return`<p style="color:#94a3b8;text-align:center;padding:40px">${t("noEntries")}</p>`;
return monthlyHTML+subHTML;
}

function addEntry(){
const cat=document.getElementById(“fCat”).value;
const sub=document.getElementById(“fSub”)?.value||null;
const amount=Number(document.getElementById(“fAmt”).value);
const date=document.getElementById(“fDate”).value;
const desc=document.getElementById(“fDesc”).value;
const lender=document.getElementById(“fLender”)?.value||null;
const transfer=document.getElementById(“fTransfer”)?.value||“bank”;
const mode=document.getElementById(“fMode”)?.value||“cash”;
if(!amount||amount<=0)return;
const needsLender=[“loan_taken”,“loan_repayment”,“creditor_purchase”,“creditor_payment”].includes(cat);
state.entries.push({id:genId(),category:cat,subcategory:sub,amount,description:desc,date,transferTo:cat===“neutral”?transfer:null,lenderName:needsLender?lender:null,paymentMode:cat===“neutral”?“cash”:mode,createdAt:Date.now()});
save();currentTab=0;renderApp();
}
function deleteEntry(id){state.entries=state.entries.filter(e=>e.id!==id);save();renderApp()}
function updateFormFields(){
const cat=document.getElementById(“fCat”).value;
const subs=SUB_KEYS[cat]||[];
const subWrap=document.getElementById(“fSubWrap”),subSel=document.getElementById(“fSub”);
if(subs.length){subWrap.classList.remove(“hidden”);subSel.innerHTML=subs.map(k=>`<option value="${k}">${subLabel(k)}</option>`).join(””)}
else{subWrap.classList.add(“hidden”)}
const needsLender=[“loan_taken”,“loan_repayment”,“creditor_purchase”,“creditor_payment”].includes(cat);
document.getElementById(“fLenderWrap”).classList.toggle(“hidden”,!needsLender);
document.getElementById(“fLenderLabel”).textContent=cat.includes(“creditor”)?t(“creditorName”):t(“lenderName”);
document.getElementById(“fTransferWrap”).classList.toggle(“hidden”,cat!==“neutral”);
document.getElementById(“fModeWrap”).classList.toggle(“hidden”,[“neutral”,“creditor_purchase”,“overdraft_taken”,“overdraft_repayment”].includes(cat));
}
function exportData(){const blob=new Blob([JSON.stringify(state,null,2)],{type:“application/json”});const url=URL.createObjectURL(blob);const a=document.createElement(“a”);a.href=url;a.download=“ledger-backup-”+new Date().toISOString().slice(0,10)+”.json”;a.click();URL.revokeObjectURL(url)}
function importData(){const input=document.createElement(“input”);input.type=“file”;input.accept=”.json”;input.onchange=e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{try{const imported=JSON.parse(ev.target.result);if(imported.entries){state=imported;save();document.getElementById(“stockInput”).value=state.openingStock||0;renderApp();alert(t(“imported”))}else alert(t(“invalidFile”))}catch{alert(t(“errorReading”))}};reader.readAsText(file)};input.click()}
function resetAll(){if(!confirm(t(“resetConfirm”)))return;state={entries:[],openingStock:0};save();document.getElementById(“stockInput”).value=0;renderApp()}
function switchTab(i){currentTab=i;renderApp()}
function setLang(l){lang=l;localStorage.setItem(“ledger-lang”,l);document.getElementById(“hdrSub”).textContent=t(“subtitle”);document.getElementById(“hdrCapital”).textContent=t(“capital”);renderApp()}

function renderApp(){
const TABS_T=[t(“dashboard”),t(“addEntry”),t(“accounts”),t(“reports”)];
document.getElementById(“tabBar”).innerHTML=TABS_T.map((tx,i)=>`<button class="tab-btn ${i===currentTab?"active":""}" onclick="switchTab(${i})">${tx}</button>`).join(””);
const content=document.getElementById(“tabContent”);
switch(currentTab){
case 0:content.innerHTML=renderDashboard();break;
case 1:content.innerHTML=renderAddEntry();setTimeout(updateFormFields,0);break;
case 2:content.innerHTML=renderAccounts();break;
case 3:content.innerHTML=renderReports();break;
}
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
state=load();
document.getElementById(“stockInput”).value=state.openingStock||0;
document.getElementById(“stockInput”).addEventListener(“change”,function(){state.openingStock=Number(this.value)||0;save();if(currentTab===0||currentTab===2)renderApp()});
document.getElementById(“langSel”).value=lang;
document.getElementById(“hdrSub”).textContent=t(“subtitle”);
document.getElementById(“hdrCapital”).textContent=t(“capital”);
renderApp();
</script>

</body>
</html>
